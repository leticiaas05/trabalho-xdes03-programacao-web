<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./login.css">
</head>
<body>
    <!-- Area principal da pagina. -->
    <main class="login-page">
        <!-- Card central do formulario. -->
        <section class="login-card">
            <!-- Links de navegacao. -->
            <nav class="login-nav">
                <a href="/">Home</a>
                <a href="/auth/cadastro">Cadastro</a>
            </nav>

            <!-- Titulo da tela de login. -->
            <header class="login-header">
                <h1>Login</h1>
                <p>Informe seu e-mail e senha para entrar.</p>
            </header>

            <!-- Formulario com os campos obrigatorios pedidos pelo professor. -->
            <form class="login-form" action="/api/auth/login" method="post">
                <!-- Campo Usuario. A API atual usa e-mail como usuario. -->
                <div class="login-field">
                    <label for="email">E-mail</label>
                    <input id="email" name="email" type="email" placeholder="Digite seu e-mail" required>
                </div>

                <!-- Campo Senha. -->
                <div class="login-field">
                    <label for="senha">Senha</label>
                    <input id="senha" name="senha" type="password" placeholder="Digite sua senha" required>
                </div>

                <!-- Botao de envio. No React, o onSubmit com fetch fica no login.js. -->
                <button type="submit">Entrar</button>
            </form>
        </section>
    </main>
</body>
</html>
